name: CI/CD - Build & Push Docker images + Smoke Test

on:
  push:
    branches: ["main"]

jobs:
  build_push_test:
    runs-on: ubuntu-latest

    env:
      BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/springboot-app
      FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/angular-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Spring Boot image
        uses: docker/build-push-action@v6
        with:
          context: ./springboot/app
          file: ./springboot/app/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Build & Push Angular image
        uses: docker/build-push-action@v6
        with:
          context: ./angular-app
          file: ./angular-app/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

      # ---- Smoke test using docker compose ----
      - name: Create .env for docker compose
        run: |
          echo "DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}" > .env

      - name: Start stack with docker compose
        run: |
          docker compose up -d
          docker compose ps

      - name: Wait for services
        run: sleep 25

      - name: Check backend reachable (404 is OK)
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8081 || true)
          echo "HTTP code from backend: $code"
          if [ "$code" = "000" ]; then
            echo "Backend not reachable"
            docker compose logs --no-color --tail=200
            exit 1
          fi

      - name: Tear down
        if: always()
        run: docker compose down -v
